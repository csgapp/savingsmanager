  <!-- ================ PWA INSTALL PROMPT ================ -->
  <style>
    #install-prompt {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 20px;
      display: none;
      z-index: 10000;
      border: 1px solid rgba(32, 178, 170, 0.3);
      animation: slideUp 0.5s ease;
    }
    
    #install-prompt.show {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .install-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #20B2AA, #1E7E74);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
    }
    
    .install-content {
      flex: 1;
    }
    
    .install-title {
      font-weight: 700;
      color: #20B2AA;
      margin-bottom: 4px;
    }
    
    .install-text {
      font-size: 13px;
      color: #6c757d;
    }
    
    .install-actions {
      display: flex;
      gap: 10px;
    }
    
    .install-btn {
      background: linear-gradient(135deg, #2F2F2F, #1a1a1a);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .install-close {
      background: none;
      border: none;
      color: #6c757d;
      cursor: pointer;
      font-size: 13px;
    }
    
    @media (max-width: 480px) {
      #install-prompt {
        left: 10px;
        right: 10px;
        bottom: 10px;
        padding: 15px;
      }
    }
  </style>
</head>
<body>
  <!-- ================ INSTALL PROMPT ================ -->
  <div id="install-prompt">
    <div class="install-icon">🏦</div>
    <div class="install-content">
      <div class="install-title">Install Savings Group Manager</div>
      <div class="install-text">Add to home screen for quick access</div>
    </div>
    <div class="install-actions">
      <button id="installBtn" class="install-btn">Install</button>
      <button id="installCloseBtn" class="install-close">✕</button>
    </div>
  </div>

  <!-- Your existing content here -->
  <script src="app.js"></script>
  
  <!-- ================ PWA INSTALL SCRIPT ================ -->
  <script>
    // ================ PWA INSTALL PROMPT ================
    let deferredPrompt;
    const installPrompt = document.getElementById('install-prompt');
    const installBtn = document.getElementById('installBtn');
    const installCloseBtn = document.getElementById('installCloseBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      setTimeout(() => {
        if (window.matchMedia('(display-mode: standalone)').matches || 
            window.navigator.standalone === true) {
          return;
        }
        const lastDismissed = localStorage.getItem('pwa-install-dismissed');
        if (lastDismissed) {
          const daysAgo = (Date.now() - parseInt(lastDismissed)) / (1000 * 60 * 60 * 24);
          if (daysAgo < 7) return;
        }
        installPrompt.classList.add('show');
      }, 2000);
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) {
        alert('To install, use the browser menu: Add to Home Screen');
        return;
      }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`User response: ${outcome}`);
      deferredPrompt = null;
      installPrompt.classList.remove('show');
    });

    installCloseBtn.addEventListener('click', () => {
      installPrompt.classList.remove('show');
      localStorage.setItem('pwa-install-dismissed', Date.now());
    });

    window.addEventListener('appinstalled', (evt) => {
      console.log('App installed successfully');
      installPrompt.classList.remove('show');
    });

    const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    const isInStandaloneMode = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    if (isIos() && !isInStandaloneMode()) {
      setTimeout(() => {
        if (!localStorage.getItem('ios-instructions-shown')) {
          alert('📱 Install this app on iPhone:\n\n1. Tap Share button\n2. Scroll down\n3. Tap "Add to Home Screen"');
          localStorage.setItem('ios-instructions-shown', Date.now());
        }
      }, 3000);
    }
  </script>
  
  <!-- ================ SERVICE WORKER (OFFLINE SUPPORT) ================ -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(registration => {
          console.log('ServiceWorker registered: ', registration.scope);
        }).catch(err => {
          console.log('ServiceWorker registration failed: ', err);
        });
      });
    }
  </script>
