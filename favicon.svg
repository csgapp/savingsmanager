<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="#183768"/>
  
  <!-- Piggy bank shape -->
  <circle cx="50" cy="45" r="25" fill="#FFD700"/>
  <circle cx="35" cy="40" r="5" fill="#333"/>
  <circle cx="65" cy="40" r="5" fill="#333"/>
  
  <!-- Coin slot -->
  <rect x="45" y="30" width="10" height="10" rx="2" fill="#26A69A"/>
  
  <!-- Coin -->
  <circle cx="75" cy="25" r="8" fill="#FFC107"/>
  <text x="72" y="30" fill="#183768" font-size="10">K</text>
  
  <!-- Growth arrow -->
  <path d="M20 70 L40 50 L60 60 L80 30" stroke="white" stroke-width="4" fill="none"/>
  <polygon points="82,30 75,25 75,35" fill="white"/>
</svg>