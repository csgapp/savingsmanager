<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  
  <!-- ================ PAGE TITLE ================ -->
  <title>Login - Savings Group Manager</title>
  
  <!-- ================ PROFESSIONAL FAVICON ================ -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%2320B2AA'/><rect x='20' y='50' width='60' height='35' fill='%23808080'/><polygon points='50,15 15,50 85,50' fill='%23B0B0B0'/><rect x='25' y='50' width='8' height='35' fill='%23A9A9A9'/><rect x='38' y='50' width='8' height='35' fill='%23A9A9A9'/><rect x='51' y='50' width='8' height='35' fill='%23A9A9A9'/><rect x='64' y='50' width='8' height='35' fill='%23A9A9A9'/><rect x='46' y='65' width='12' height='20' fill='%232F2F2F'/><circle cx='52' cy='75' r='2' fill='%23FFD700'/></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%2320B2AA'/><rect x='36' y='90' width='108' height='63' fill='%23808080'/><polygon points='90,27 27,90 153,90' fill='%23B0B0B0'/><rect x='45' y='90' width='14' height='63' fill='%23A9A9A9'/><rect x='68' y='90' width='14' height='63' fill='%23A9A9A9'/><rect x='91' y='90' width='14' height='63' fill='%23A9A9A9'/><rect x='114' y='90' width='14' height='63' fill='%23A9A9A9'/><rect x='82' y='117' width='22' height='36' fill='%232F2F2F'/><circle cx='93' cy='135' r='4' fill='%23FFD700'/></svg>">
  <meta name="msapplication-TileColor" content="#20B2AA">
  <meta name="theme-color" content="#20B2AA">
  
  <!-- ================ STYLESHEETS ================ -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    .auth-page {
      background: linear-gradient(135deg, #183768, #0e1f3a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .auth-container {
      width: 100%;
      max-width: 450px;
    }
    
    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.6s ease;
    }
    
    .logo-area {
      text-align: center;
      margin-bottom: 30px;
    }
    
    .app-icon {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #20B2AA, #1E7E74);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      font-size: 40px;
      color: white;
      box-shadow: 0 10px 20px rgba(0,0,0,0.2);
    }
    
    .auth-card h1 {
      color: #183768;
      margin-bottom: 5px;
      font-size: 28px;
    }
    
    .auth-card h2 {
      color: #6c757d;
      font-size: 16px;
      font-weight: 400;
      margin-bottom: 30px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #183768;
      font-weight: 600;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus {
      border-color: #26A69A;
      outline: none;
      box-shadow: 0 0 0 3px rgba(38,166,154,0.1);
    }
    
    .forgot-link {
      display: block;
      text-align: right;
      color: #26A69A;
      text-decoration: none;
      font-size: 14px;
      margin-top: 8px;
    }
    
    .btn-primary {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #26A69A, #1E7E74);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(38,166,154,0.3);
    }
    
    .setup-prompt {
      margin-top: 30px;
      padding: 25px;
      background: #f8f9fa;
      border-radius: 12px;
      border: 2px dashed #183768;
      text-align: center;
    }
    
    .setup-prompt p {
      color: #183768;
      margin-bottom: 15px;
      font-weight: 600;
      font-size: 15px;
    }
    
    .btn-setup {
      display: inline-block;
      padding: 12px 30px;
      background: linear-gradient(135deg, #183768, #1e4282);
      color: white;
      text-decoration: none;
      border-radius: 50px;
      font-weight: 600;
      transition: all 0.3s ease;
      border: none;
      cursor: pointer;
    }
    
    .btn-setup:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(24,55,104,0.3);
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
  </style>
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-card">
      <div class="logo-area">
        <div class="app-icon">🏦</div>
        <h1>Savings Group Manager</h1>
        <h2>Login to your account</h2>
      </div>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="Enter your email" required autocomplete="email">
        </div>
        
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required autocomplete="current-password">
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>
        
        <button type="submit" id="loginBtn" class="btn-primary">
          <span class="btn-text">Login</span>
        </button>
      </form>
      
      <div id="loginMessage" class="message"></div>
      
      <!-- First-time setup prompt - ONLY shown when no admin exists -->
      <div id="setupPrompt" class="setup-prompt" style="display: none;">
        <p>🚀 First time using Savings Group Manager?</p>
        <a href="setup.html" class="btn-setup">Create Admin Account</a>
      </div>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', function() {
      // Check if any admin exists
      const users = StorageManager.getItem(StorageManager.KEYS.USERS) || [];
      const adminExists = users.some(u => u.role === 'admin');
      
      // Show setup prompt if no admin
      const setupPrompt = document.getElementById('setupPrompt');
      if (setupPrompt) {
        setupPrompt.style.display = adminExists ? 'none' : 'block';
      }
      
      // Handle login form submission
      document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const btn = document.getElementById('loginBtn');
        const msg = document.getElementById('loginMessage');
        
        // Clear previous messages
        msg.className = 'message';
        msg.textContent = '';
        
        // Show loading state
        btn.classList.add('btn-loading');
        btn.disabled = true;
        
        // Simulate network delay
        setTimeout(() => {
          try {
            const user = StorageManager.authenticateUser(email, password);
            
            if (user) {
              // Remove password from session storage
              const { password, ...userWithoutPassword } = user;
              AuthManager.setCurrentUser(userWithoutPassword);
              
              // Redirect based on role
              if (user.role === 'admin') {
                window.location.href = 'admin.html';
              } else {
                window.location.href = 'member-portal.html';
              }
            } else {
              // Show error
              btn.classList.remove('btn-loading');
              btn.disabled = false;
              
              msg.textContent = 'Invalid email or password';
              msg.className = 'message error-message';
            }
          } catch (error) {
            console.error('Login error:', error);
            btn.classList.remove('btn-loading');
            btn.disabled = false;
            
            msg.textContent = 'An error occurred. Please try again.';
            msg.className = 'message error-message';
          }
        }, 800);
      });
    });
  </script>
</body>
</html>
