<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  
  <!-- ================ PAGE TITLE ================ -->
  <title>Reset Password - Savings Group Manager</title>
  
  <!-- ================ PROFESSIONAL FAVICON - INSTANT ================ -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23183768'/><circle cx='50' cy='45' r='25' fill='%23FFD700'/><circle cx='35' cy='40' r='5' fill='%23333'/><circle cx='65' cy='40' r='5' fill='%23333'/><rect x='45' y='30' width='10' height='10' rx='2' fill='%2326A69A'/><circle cx='75' cy='25' r='8' fill='%23FFC107'/><text x='72' y='30' fill='%23183768' font-size='10'>K</text><path d='M20 70 L40 50 L60 60 L80 30' stroke='white' stroke-width='4' fill='none'/><polygon points='82,30 75,25 75,35' fill='white'/></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%23183768'/><circle cx='90' cy='81' r='45' fill='%23FFD700'/><circle cx='63' cy='72' r='9' fill='%23333'/><circle cx='117' cy='72' r='9' fill='%23333'/><rect x='81' y='54' width='18' height='18' rx='4' fill='%2326A69A'/><circle cx='135' cy='45' r='14' fill='%23FFC107'/><text x='130' y='52' fill='%23183768' font-size='18'>K</text><path d='M36 126 L72 90 L108 108 L144 54' stroke='white' stroke-width='8' fill='none'/><polygon points='148,54 136,45 136,63' fill='white'/></svg>">
  <meta name="msapplication-TileColor" content="#183768">
  <meta name="theme-color" content="#183768">
  
  <!-- ================ STYLESHEETS ================ -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    .auth-page {
      background: linear-gradient(135deg, #183768, #0e1f3a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .auth-container {
      width: 100%;
      max-width: 450px;
    }
    
    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.6s ease;
    }
    
    .reset-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #26A69A, #1E7E74);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: white;
      font-size: 32px;
    }
    
    h2 {
      color: #183768;
      text-align: center;
      margin-bottom: 10px;
    }
    
    .email-display {
      background: #f8f9fa;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
      margin-bottom: 30px;
      color: #183768;
      font-weight: 600;
      border: 1px solid #e9ecef;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #183768;
      font-weight: 600;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus {
      border-color: #26A69A;
      outline: none;
      box-shadow: 0 0 0 3px rgba(38,166,154,0.1);
    }
    
    .password-strength {
      margin-top: 8px;
      height: 6px;
      background: #e9ecef;
      border-radius: 3px;
      overflow: hidden;
    }
    
    .strength-bar {
      height: 100%;
      width: 0;
      transition: all 0.3s ease;
    }
    
    .strength-weak {
      background: #dc3545;
      width: 33.33%;
    }
    
    .strength-medium {
      background: #ffc107;
      width: 66.66%;
    }
    
    .strength-strong {
      background: #28a745;
      width: 100%;
    }
    
    .password-requirements {
      margin-top: 10px;
      font-size: 12px;
      color: #6c757d;
      padding-left: 20px;
    }
    
    .password-requirements li {
      margin-bottom: 4px;
    }
    
    .password-requirements .valid {
      color: #28a745;
    }
    
    .btn-reset {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #26A69A, #1E7E74);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 20px;
    }
    
    .btn-reset:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(38,166,154,0.3);
    }
    
    .btn-reset:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .back-to-login {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #6c757d;
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-to-login:hover {
      color: #26A69A;
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    #install-prompt {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 20px;
      display: none;
      z-index: 10000;
      border: 1px solid rgba(38, 166, 154, 0.3);
      animation: slideUp 0.5s ease;
    }
    
    #install-prompt.show {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .install-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #183768, #1e4282);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
    }
    
    .install-content {
      flex: 1;
    }
    
    .install-title {
      font-weight: 700;
      color: #183768;
      margin-bottom: 4px;
    }
    
    .install-text {
      font-size: 13px;
      color: #6c757d;
    }
    
    .install-actions {
      display: flex;
      gap: 10px;
    }
    
    .install-btn {
      background: linear-gradient(135deg, #26A69A, #1E7E74);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .install-close {
      background: none;
      border: none;
      color: #6c757d;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body class="auth-page">
  <!-- ================ INSTALL APP PROMPT ================ -->
  <div id="install-prompt">
    <div class="install-icon">🏦</div>
    <div class="install-content">
      <div class="install-title">Install Savings Group Manager</div>
      <div class="install-text">Add to home screen for quick access</div>
    </div>
    <div class="install-actions">
      <button id="installBtn" class="install-btn">Install</button>
      <button id="installCloseBtn" class="install-close">✕</button>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <div class="reset-icon">🔐</div>
      <h2>Set New Password</h2>
      <div class="email-display" id="emailDisplay">
        admin@example.com
      </div>
      
      <form id="resetPasswordForm">
        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" placeholder="Enter new password" required autofocus>
          <div class="password-strength">
            <div id="strengthBar" class="strength-bar"></div>
          </div>
        </div>
        
        <div class="form-group">
          <label for="confirmPassword">Confirm Password</label>
          <input type="password" id="confirmPassword" placeholder="Confirm new password" required>
        </div>
        
        <ul class="password-requirements" id="passwordRequirements">
          <li id="reqLength">❌ At least 8 characters</li>
          <li id="reqLower">❌ Contains lowercase letter</li>
          <li id="reqUpper">❌ Contains uppercase letter</li>
          <li id="reqNumber">❌ Contains number</li>
          <li id="reqMatch">❌ Passwords match</li>
        </ul>
        
        <button type="submit" id="updatePasswordBtn" class="btn-reset">
          <span class="btn-text">Update Password</span>
        </button>
      </form>
      
      <div id="message" class="message"></div>
      
      <a href="login.html" class="back-to-login">← Back to Login</a>
    </div>
  </div>

  <script>
    // Get email from URL or localStorage (demo purpose)
    document.addEventListener('DOMContentLoaded', function() {
      // For demo, show sample email
      const emailDisplay = document.getElementById('emailDisplay');
      emailDisplay.textContent = 'admin@example.com';
      
      // Password strength checker
      const newPassword = document.getElementById('newPassword');
      const confirmPassword = document.getElementById('confirmPassword');
      const strengthBar = document.getElementById('strengthBar');
      
      function checkPasswordStrength() {
        const password = newPassword.value;
        const confirm = confirmPassword.value;
        
        // Check requirements
        const hasLength = password.length >= 8;
        const hasLower = /[a-z]/.test(password);
        const hasUpper = /[A-Z]/.test(password);
        const hasNumber = /[0-9]/.test(password);
        const hasMatch = password === confirm && password.length > 0;
        
        // Update requirement indicators
        document.getElementById('reqLength').innerHTML = (hasLength ? '✅' : '❌') + ' At least 8 characters';
        document.getElementById('reqLength').style.color = hasLength ? '#28a745' : '#6c757d';
        
        document.getElementById('reqLower').innerHTML = (hasLower ? '✅' : '❌') + ' Contains lowercase letter';
        document.getElementById('reqLower').style.color = hasLower ? '#28a745' : '#6c757d';
        
        document.getElementById('reqUpper').innerHTML = (hasUpper ? '✅' : '❌') + ' Contains uppercase letter';
        document.getElementById('reqUpper').style.color = hasUpper ? '#28a745' : '#6c757d';
        
        document.getElementById('reqNumber').innerHTML = (hasNumber ? '✅' : '❌') + ' Contains number';
        document.getElementById('reqNumber').style.color = hasNumber ? '#28a745' : '#6c757d';
        
        document.getElementById('reqMatch').innerHTML = (hasMatch ? '✅' : '❌') + ' Passwords match';
        document.getElementById('reqMatch').style.color = hasMatch ? '#28a745' : '#6c757d';
        
        // Calculate strength
        let strength = 0;
        if (hasLength) strength++;
        if (hasLower) strength++;
        if (hasUpper) strength++;
        if (hasNumber) strength++;
        
        strengthBar.className = 'strength-bar';
        if (strength <= 2) {
          strengthBar.classList.add('strength-weak');
        } else if (strength <= 3) {
          strengthBar.classList.add('strength-medium');
        } else {
          strengthBar.classList.add('strength-strong');
        }
        
        // Enable/disable submit button based on all requirements
        const isValid = hasLength && hasLower && hasUpper && hasNumber && hasMatch;
        document.getElementById('updatePasswordBtn').disabled = !isValid;
      }
      
      newPassword.addEventListener('input', checkPasswordStrength);
      confirmPassword.addEventListener('input', checkPasswordStrength);
      
      // Form submission
      document.getElementById('resetPasswordForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const btn = document.getElementById('updatePasswordBtn');
        const msg = document.getElementById('message');
        
        btn.classList.add('btn-loading');
        btn.disabled = true;
        
        // Simulate API call
        setTimeout(() => {
          btn.classList.remove('btn-loading');
          
          msg.innerHTML = `
            <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
              <span style="font-size: 48px;">✅</span>
              <h3 style="color: #28a745; margin: 0;">Password Reset Successfully!</h3>
              <p style="color: #6c757d; margin: 10px 0;">Your password has been updated. You can now login with your new password.</p>
            </div>
          `;
          msg.className = 'message success-message';
          
          // Clear form
          document.getElementById('newPassword').value = '';
          document.getElementById('confirmPassword').value = '';
          
          // Redirect to login after 3 seconds
          setTimeout(() => {
            window.location.href = 'login.html';
          }, 3000);
        }, 1500);
      });
      
      // Initial check
      checkPasswordStrength();
    });
  </script>
  
  <!-- ================ PWA INSTALL SCRIPT ================ -->
  <script>
    let deferredPrompt;
    const installPrompt = document.getElementById('install-prompt');
    const installBtn = document.getElementById('installBtn');
    const installCloseBtn = document.getElementById('installCloseBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      setTimeout(() => {
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) return;
        const lastDismissed = localStorage.getItem('pwa-install-dismissed');
        if (lastDismissed) {
          const daysAgo = (Date.now() - parseInt(lastDismissed)) / (1000 * 60 * 60 * 24);
          if (daysAgo < 7) return;
        }
        installPrompt.classList.add('show');
      }, 2000);
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) {
        alert('To install, use the browser menu: Add to Home Screen');
        return;
      }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`Install prompt outcome: ${outcome}`);
      deferredPrompt = null;
      installPrompt.classList.remove('show');
    });

    installCloseBtn.addEventListener('click', () => {
      installPrompt.classList.remove('show');
      localStorage.setItem('pwa-install-dismissed', Date.now());
    });

    window.addEventListener('appinstalled', (evt) => {
      console.log('App was installed successfully');
      installPrompt.classList.remove('show');
      localStorage.removeItem('pwa-install-dismissed');
    });

    const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    const isInStandaloneMode = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    if (isIos() && !isInStandaloneMode()) {
      setTimeout(() => {
        if (!localStorage.getItem('ios-instructions-shown')) {
          alert('📱 Install this app on iPhone:\n\n1. Tap Share button\n2. Scroll down\n3. Tap "Add to Home Screen"');
          localStorage.setItem('ios-instructions-shown', Date.now());
        }
      }, 3000);
    }
  </script>
</body>
</html>
