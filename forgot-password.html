<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
  
  <!-- ================ PAGE TITLE ================ -->
  <title>Forgot Password - Savings Group Manager</title>
  
  <!-- ================ PROFESSIONAL FAVICON - INSTANT ================ -->
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23183768'/><circle cx='50' cy='45' r='25' fill='%23FFD700'/><circle cx='35' cy='40' r='5' fill='%23333'/><circle cx='65' cy='40' r='5' fill='%23333'/><rect x='45' y='30' width='10' height='10' rx='2' fill='%2326A69A'/><circle cx='75' cy='25' r='8' fill='%23FFC107'/><text x='72' y='30' fill='%23183768' font-size='10'>K</text><path d='M20 70 L40 50 L60 60 L80 30' stroke='white' stroke-width='4' fill='none'/><polygon points='82,30 75,25 75,35' fill='white'/></svg>">
  <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='36' fill='%23183768'/><circle cx='90' cy='81' r='45' fill='%23FFD700'/><circle cx='63' cy='72' r='9' fill='%23333'/><circle cx='117' cy='72' r='9' fill='%23333'/><rect x='81' y='54' width='18' height='18' rx='4' fill='%2326A69A'/><circle cx='135' cy='45' r='14' fill='%23FFC107'/><text x='130' y='52' fill='%23183768' font-size='18'>K</text><path d='M36 126 L72 90 L108 108 L144 54' stroke='white' stroke-width='8' fill='none'/><polygon points='148,54 136,45 136,63' fill='white'/></svg>">
  <meta name="msapplication-TileColor" content="#183768">
  <meta name="theme-color" content="#183768">
  
  <!-- ================ STYLESHEETS ================ -->
  <link rel="stylesheet" href="styles.css">
  
  <style>
    .auth-page {
      background: linear-gradient(135deg, #183768, #0e1f3a);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    
    .auth-container {
      width: 100%;
      max-width: 450px;
    }
    
    .auth-card {
      background: white;
      border-radius: 16px;
      padding: 40px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      animation: slideUp 0.6s ease;
    }
    
    .back-icon {
      display: inline-block;
      margin-bottom: 20px;
      color: var(--dark-gray);
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-icon:hover {
      color: var(--secondary);
    }
    
    .lock-icon {
      width: 70px;
      height: 70px;
      background: linear-gradient(135deg, #26A69A, #1E7E74);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 20px;
      color: white;
      font-size: 32px;
    }
    
    h2 {
      color: #183768;
      text-align: center;
      margin-bottom: 10px;
    }
    
    .subtitle {
      text-align: center;
      color: #6c757d;
      margin-bottom: 30px;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      color: #183768;
      font-weight: 600;
      font-size: 14px;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 16px;
      transition: all 0.3s ease;
    }
    
    .form-group input:focus {
      border-color: #26A69A;
      outline: none;
      box-shadow: 0 0 0 3px rgba(38,166,154,0.1);
    }
    
    .btn-reset {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #26A69A, #1E7E74);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin-top: 10px;
    }
    
    .btn-reset:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(38,166,154,0.3);
    }
    
    .btn-reset:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .security-note {
      background: #fff3cd;
      border: 1px solid #ffc107;
      border-radius: 8px;
      padding: 15px;
      margin-top: 20px;
      font-size: 13px;
      color: #856404;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    
    .back-to-login {
      display: block;
      text-align: center;
      margin-top: 20px;
      color: #6c757d;
      text-decoration: none;
      font-size: 14px;
    }
    
    .back-to-login:hover {
      color: #26A69A;
    }
    
    .message {
      margin-top: 20px;
      padding: 12px;
      border-radius: 8px;
      text-align: center;
    }
    
    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(30px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }
    
    #install-prompt {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      max-width: 400px;
      margin: 0 auto;
      background: white;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      padding: 20px;
      display: none;
      z-index: 10000;
      border: 1px solid rgba(38, 166, 154, 0.3);
      animation: slideUp 0.5s ease;
    }
    
    #install-prompt.show {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    
    .install-icon {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #183768, #1e4282);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 28px;
    }
    
    .install-content {
      flex: 1;
    }
    
    .install-title {
      font-weight: 700;
      color: #183768;
      margin-bottom: 4px;
    }
    
    .install-text {
      font-size: 13px;
      color: #6c757d;
    }
    
    .install-actions {
      display: flex;
      gap: 10px;
    }
    
    .install-btn {
      background: linear-gradient(135deg, #26A69A, #1E7E74);
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
    
    .install-close {
      background: none;
      border: none;
      color: #6c757d;
      cursor: pointer;
      font-size: 13px;
    }
  </style>
</head>
<body class="auth-page">
  <!-- ================ INSTALL APP PROMPT ================ -->
  <div id="install-prompt">
    <div class="install-icon">🏦</div>
    <div class="install-content">
      <div class="install-title">Install Savings Group Manager</div>
      <div class="install-text">Add to home screen for quick access</div>
    </div>
    <div class="install-actions">
      <button id="installBtn" class="install-btn">Install</button>
      <button id="installCloseBtn" class="install-close">✕</button>
    </div>
  </div>

  <div class="auth-container">
    <div class="auth-card">
      <a href="login.html" class="back-icon">← Back to Login</a>
      
      <div class="lock-icon">🔒</div>
      <h2>Forgot Password?</h2>
      <p class="subtitle">No worries! Enter your email and we'll send you reset instructions.</p>
      
      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="your@email.com" required autofocus>
        </div>
        
        <button type="submit" id="resetBtn" class="btn-reset">
          <span class="btn-text">Send Reset Link</span>
        </button>
      </form>
      
      <div id="message" class="message"></div>
      
      <div class="security-note">
        <span style="font-size: 20px;">🔐</span>
        <span>We'll send a secure reset link to your email. The link will expire in 1 hour.</span>
      </div>
      
      <a href="login.html" class="back-to-login">Remember your password? Login</a>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('forgotPasswordForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const email = document.getElementById('email').value;
      const btn = document.getElementById('resetBtn');
      const msg = document.getElementById('message');
      
      // Simple validation
      if (!email || !email.includes('@') || !email.includes('.')) {
        msg.textContent = 'Please enter a valid email address';
        msg.className = 'message error-message';
        return;
      }
      
      // Show loading state
      btn.classList.add('btn-loading');
      btn.disabled = true;
      msg.className = 'message';
      msg.textContent = '';
      
      // Simulate API call
      setTimeout(() => {
        btn.classList.remove('btn-loading');
        btn.disabled = false;
        
        // Always show success for security (don't reveal if email exists)
        msg.innerHTML = `
          <div style="display: flex; flex-direction: column; align-items: center; gap: 10px;">
            <span style="font-size: 24px;">✅</span>
            <span>If an account exists with <strong>${email}</strong>, you'll receive reset instructions.</span>
          </div>
        `;
        msg.className = 'message success-message';
        
        // Clear form
        document.getElementById('email').value = '';
        
        // Redirect to reset page demo (in production, this would be email link)
        setTimeout(() => {
          window.location.href = 'reset-password.html';
        }, 3000);
      }, 1500);
    });
  </script>
  
  <!-- ================ PWA INSTALL SCRIPT ================ -->
  <script>
    let deferredPrompt;
    const installPrompt = document.getElementById('install-prompt');
    const installBtn = document.getElementById('installBtn');
    const installCloseBtn = document.getElementById('installCloseBtn');

    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      
      setTimeout(() => {
        if (window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true) return;
        const lastDismissed = localStorage.getItem('pwa-install-dismissed');
        if (lastDismissed) {
          const daysAgo = (Date.now() - parseInt(lastDismissed)) / (1000 * 60 * 60 * 24);
          if (daysAgo < 7) return;
        }
        installPrompt.classList.add('show');
      }, 2000);
    });

    installBtn.addEventListener('click', async () => {
      if (!deferredPrompt) {
        alert('To install, use the browser menu: Add to Home Screen');
        return;
      }
      deferredPrompt.prompt();
      const { outcome } = await deferredPrompt.userChoice;
      console.log(`Install prompt outcome: ${outcome}`);
      deferredPrompt = null;
      installPrompt.classList.remove('show');
    });

    installCloseBtn.addEventListener('click', () => {
      installPrompt.classList.remove('show');
      localStorage.setItem('pwa-install-dismissed', Date.now());
    });

    window.addEventListener('appinstalled', (evt) => {
      console.log('App was installed successfully');
      installPrompt.classList.remove('show');
      localStorage.removeItem('pwa-install-dismissed');
    });

    const isIos = () => /iphone|ipad|ipod/.test(window.navigator.userAgent.toLowerCase());
    const isInStandaloneMode = () => window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone;

    if (isIos() && !isInStandaloneMode()) {
      setTimeout(() => {
        if (!localStorage.getItem('ios-instructions-shown')) {
          alert('📱 Install this app on iPhone:\n\n1. Tap Share button\n2. Scroll down\n3. Tap "Add to Home Screen"');
          localStorage.setItem('ios-instructions-shown', Date.now());
        }
      }, 3000);
    }
  </script>
</body>
</html>
